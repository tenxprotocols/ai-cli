name: release-build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Cross-compile
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          ldflags="-s -w -X github.com/tenxprotocols/ai-cli/internal/version.Version=${GITHUB_REF_NAME}"
          mkdir -p dist
          build() { # os arch suffix cgo
            out="ai_${version}_$1_$2$3"
            CGO_ENABLED=$4 GOOS=$1 GOARCH=$2 go build -trimpath -ldflags="$ldflags" -o "dist/ai" ./cmd/ai
            tar -C dist -czf "dist/${out}.tar.gz" ai && rm dist/ai
          }
          build linux amd64 "" 0
          build linux arm64 "" 0
          build darwin amd64 "" 0
          build darwin arm64 "" 0
          build windows amd64 "" 0
          (cd dist && shasum -a 256 *.tar.gz > checksums.txt)
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/checksums.txt
